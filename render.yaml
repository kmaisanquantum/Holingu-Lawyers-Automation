###############################################################
#  Holingu Lawyers Analytical Repository
#  Render Deployment — render.yaml
#  Drop this file in the repo ROOT before pushing to GitHub
###############################################################

services:
  - type: web
    name: holingu-lawyers
    runtime: python
    region: singapore          # Closest to Port Moresby, Papua New Guinea
    plan: free

    # Build & start — run from repo root
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: holingu-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: PYTHON_VERSION
        value: "3.11.0"

    # 1 GB persistent disk — keeps uploaded PDFs across deploys
    disk:
      name: holingu-data
      mountPath: /data
      sizeGB: 1

    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: holingu-db
    region: singapore
    plan: free
