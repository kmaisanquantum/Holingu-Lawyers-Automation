###############################################################
#  Holingu Lawyers Analytical Repository
#  Render Deployment — render.yaml
#  Drop this file in the repo ROOT before pushing to GitHub
###############################################################

services:
  - type: web
    name: holingu-lawyers
    runtime: python
    region: singapore          # Closest to Port Moresby, Papua New Guinea
    plan: free

    # Build & start — run from repo root, cd into backend
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_PATH
        value: /data/holingu_vault.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: PYTHON_VERSION
        value: "3.11.0"

    # 1 GB persistent disk — keeps SQLite DB + uploaded PDFs across deploys
    disk:
      name: holingu-data
      mountPath: /data
      sizeGB: 1

    healthCheckPath: /health
    autoDeploy: true
